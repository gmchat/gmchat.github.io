<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Поддержка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .btn-open {
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 18px 40px;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 4px 24px rgba(79,142,247,0.4);
      transition: transform 0.1s;
    }

    .btn-open:active {
      transform: scale(0.97);
    }

    /* Модальное окно */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #fff;
      width: 100%;
      height: 95vh;
      border-radius: 20px 20px 0 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px;
      background: #f7f7f7;
      border-bottom: 1px solid #e0e0e0;
      flex-shrink: 0;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      color: #222;
    }

    .btn-close {
      background: #e0e0e0;
      border: none;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
    }

    iframe {
      flex: 1;
      border: none;
      width: 100%;
    }
  </style>
</head>
<body>

  <button class="btn-open" type="button" onclick="openModal()">Написать консультанту</button>

  <div class="modal-overlay active" id="overlay" onclick="handleOverlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title">Онлайн-консультация</span>
        <button type="button" class="btn-close" onclick="closeModal()">✕</button>
      </div>
      <iframe
        id="chatFrame"
        src="https://gmchat.mooo.com/chat"
        data-src="https://gmchat.mooo.com/chat"
        allow="microphone; camera">
      </iframe>
    </div>
  </div>

  <script>
    function openModal() {
      const overlay = document.getElementById('overlay');
      const frame = document.getElementById('chatFrame');

      if (!frame.src || frame.src === window.location.href) {
        frame.src = frame.dataset.src;
      }

      overlay.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('overlay').classList.remove('active');
      document.body.style.overflow = '';
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('overlay')) {
        closeModal();
      }
    }

    window.addEventListener('popstate', closeModal);
    document.getElementById('overlay').addEventListener('touchstart', function(e) {
      if (e.target === this) closeModal();
    });

    document.addEventListener('DOMContentLoaded', function() {
      document.body.style.overflow = 'hidden';
    });
  </script>

</body>
</html>
