<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Поддержка</title>
  <script>
    (function () {
      try {
        if (/[?&]embed=1(?:&|$)/.test(location.search)) return;
        var touchUi =
          window.matchMedia &&
          (window.matchMedia("(pointer: coarse)").matches ||
            window.matchMedia("(hover: none)").matches);
        var narrow =
          window.matchMedia && window.matchMedia("(max-width: 1024px)").matches;
        if (touchUi && narrow) {
          window.location.replace("https://gmchat.mooo.com/chat/");
        }
      } catch (e) {}
    })();
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100vh;
      height: 100svh;
      max-height: 100svh;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      max-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
    }

    iframe {
      display: block;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    src="https://gmchat.mooo.com/chat"
    title="Онлайн-консультация"
    allow="microphone; camera">
  </iframe>
  <script>
    (function () {
      function fitHost() {
        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        if (h > 0) {
          document.documentElement.style.height = h + "px";
        }
      }
      fitHost();
      window.addEventListener("resize", fitHost);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitHost);
      }
      window.addEventListener("orientationchange", function () {
        setTimeout(fitHost, 400);
      });
      window.addEventListener("pageshow", fitHost);
    })();
  </script>
</body>
</html>
