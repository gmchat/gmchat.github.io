<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Поддержка</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      height: 100vh;
      height: 100svh;
      max-height: 100svh;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      max-height: 100%;
      margin: 0;
      overflow: hidden;
      background: #1a1a2e;
    }

    iframe {
      display: block;
      position: fixed;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe
    id="gmchatFrame"
    src="https://gmchat.mooo.com/chat/?embed=1"
    title="Онлайн-консультация"
    allow="microphone; camera">
  </iframe>
  <script>
    (function () {
      var iframe = document.getElementById("gmchatFrame");
      var CHAT_ORIGIN = "https://gmchat.mooo.com";
      function applyOuterHeight(px) {
        if (px < 80) return;
        var h = Math.ceil(px) + "px";
        document.documentElement.style.height = h;
        document.body.style.height = h;
        if (iframe) iframe.style.height = h;
      }
      function fitHost() {
        var vv = window.visualViewport;
        var h = vv ? vv.height : window.innerHeight;
        if (h > 0) applyOuterHeight(h);
      }
      window.addEventListener("message", function (e) {
        if (e.origin !== CHAT_ORIGIN) return;
        var d = e.data;
        if (!d || d.type !== "gmchat-embed-size") return;
        var nh = Number(d.height);
        if (nh < 80 || nh > 32000) return;
        var vv = window.visualViewport;
        var cap = vv ? vv.height : window.innerHeight;
        if (cap > 0) nh = Math.min(nh, Math.ceil(cap));
        applyOuterHeight(nh);
      });
      fitHost();
      window.addEventListener("resize", fitHost);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fitHost);
        window.visualViewport.addEventListener("scroll", fitHost);
      }
      window.addEventListener("orientationchange", function () {
        setTimeout(fitHost, 400);
      });
      window.addEventListener("pageshow", fitHost);
    })();
  </script>
</body>
</html>
